# theFool Nginx Reverse Proxy
# Place in /www/server/panel/vhost/nginx/thefool.conf (auto-loaded by Nginx)

server {
    listen 80;
    server_name _;

    # Increase upload size for avatar uploads
    client_max_body_size 10M;

    # Frontend static files (Nuxt SPA build output)
    root /opt/theFool/the-fool-frontend/.output/public;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Never cache index.html — it references content-hashed JS chunks
    # that change every deploy. Caching it causes 404s on stale chunks.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }


    # Static assets with long cache
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static images/avatars
    location /static/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API proxy to Hono backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
